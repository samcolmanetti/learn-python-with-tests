name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Lint, test & build the book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the book
        run: |
          npm install
          npx honkit build
